name: Production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC federated login for the Front Door cache purge

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      PUBLIC_ENV: preview # gates run first; the production-stamped build happens in deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Verify (build, check, claims lint, a11y, perf budgets)
        run: npm run verify

      - name: Clinician-approval gate (BUILD_SPEC §7)
        run: npm run check:approvals

  # Deploys only when FRONT_DOOR_ID is configured — before the Azure infra
  # exists this job is skipped and main stays green on verify alone.
  deploy:
    needs: verify
    if: vars.FRONT_DOOR_ID != ''
    runs-on: ubuntu-latest
    env:
      PUBLIC_ENV: production
      FRONT_DOOR_ID: ${{ vars.FRONT_DOOR_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Clinician-approval gate (runs in the deploy job per BUILD_SPEC §7)
        run: npm run check:approvals

      - name: Production build (Front Door lockdown config)
        run: npm run build

      - name: Deploy to Azure Static Web Apps (production)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: dist
          skip_app_build: true

      - name: Azure login (OIDC, scoped to the Front Door profile)
        if: env.AZURE_CLIENT_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Purge Front Door cache
        if: env.AZURE_CLIENT_ID != ''
        run: |
          az afd endpoint purge \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --profile-name "${{ vars.FRONT_DOOR_PROFILE }}" \
            --endpoint-name "${{ vars.FRONT_DOOR_ENDPOINT }}" \
            --content-paths '/*'
